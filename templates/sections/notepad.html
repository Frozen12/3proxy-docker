<div class="card p-6 rounded-xl shadow-lg hover:shadow-xl transition-all duration-300 border border-themed">
    <h2 class="text-2xl font-bold mb-6 text-primary-color flex items-center">
        <i class="fas fa-clipboard mr-3 text-accent-color"></i> Notepad
    </h2>
    
    <form hx-post="/save-notepad" 
          hx-trigger="keyup changed delay:1s"
          hx-target="#notepad-status" 
          hx-swap="innerHTML"
          class="space-y-4">
        <textarea id="notepad-content" 
                  name="content" 
                  class="input-field w-full p-4 rounded-lg min-h-[400px] font-mono text-sm"
                  placeholder="Type or paste your notes here. Auto-saves as you type..."></textarea>
        <div id="notepad-status" class="text-xs text-gray-400"></div>
    </form>
</div>

<script>
// Load saved notepad content
htmx.ajax('GET', '/get-notepad-content', {target: '#notepad-content', swap: 'innerHTML'});
</script>
