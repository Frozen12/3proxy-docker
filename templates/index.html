<!DOCTYPE html>
<html lang="en" class="dark-mode">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rclone WebGUI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="icon" href="{{ url_for('static', filename='favicon.svg') }}" type="image/svg+xml">
    
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    
    <!-- Apply theme immediately to prevent flash -->
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark-mode';
            document.documentElement.className = savedTheme;
        })();
    </script>
</head>
<body class="flex flex-col min-h-screen bg-gradient-to-br from-gray-900 via-gray-800 to-gray-900">
    <!-- Header -->
    <header class="bg-card-bg-color/95 backdrop-blur-md p-4 shadow-lg flex flex-wrap justify-between items-center sticky top-0 z-50 border-b border-themed">
        <div class="flex items-center">
            <img src="{{ url_for('static', filename='favicon.svg') }}" alt="Logo" class="h-10 w-10 text-accent-color mr-3 animate-pulse">
            <h1 class="text-3xl font-bold bg-gradient-to-r from-accent-color to-blue-400 bg-clip-text text-transparent">Rclone WebGUI</h1>
        </div>
        <div class="flex items-center space-x-3 mt-2 md:mt-0 ml-auto">
            <!-- Theme Changer -->
            <div class="relative inline-block text-left">
                <button type="button" id="themeChangerBtn" 
                        class="btn-secondary px-4 py-2 rounded-lg text-sm font-medium hover:scale-105 transition-transform">
                    <i class="fas fa-palette mr-2"></i> Themes
                </button>
                <div id="themeDropdown" class="origin-top-right absolute right-0 mt-2 w-48 rounded-xl shadow-2xl bg-card-bg-color ring-1 ring-themed hidden z-50">
                    <div class="py-1" role="none">
                        <a href="#" class="block px-4 py-2 text-sm text-text-color hover:bg-accent-color/20 rounded-md mx-1" data-theme="dark-mode">Dark Green</a>
                        <a href="#" class="block px-4 py-2 text-sm text-text-color hover:bg-accent-color/20 rounded-md mx-1" data-theme="black-mode">Black</a>
                        <a href="#" class="block px-4 py-2 text-sm text-text-color hover:bg-accent-color/20 rounded-md mx-1" data-theme="theme-blue">Blue</a>
                        <a href="#" class="block px-4 py-2 text-sm text-text-color hover:bg-accent-color/20 rounded-md mx-1" data-theme="theme-purple">Purple</a>
                        <a href="#" class="block px-4 py-2 text-sm text-text-color hover:bg-accent-color/20 rounded-md mx-1" data-theme="theme-orange">Orange</a>
                    </div>
                </div>
            </div>
            <button onclick="logout()" class="btn-danger px-4 py-2 rounded-lg text-sm font-medium hover:scale-105 transition-transform">
                <i class="fas fa-sign-out-alt mr-2"></i>Logout
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 container mx-auto p-4 md:p-6 flex flex-col lg:flex-row gap-4 md:gap-6">
        <!-- Left: Navigation -->
        <aside class="w-full lg:w-1/4">
            <nav class="card p-4 md:p-5 rounded-2xl shadow-xl border border-themed/50 backdrop-blur-sm">
                <ul class="space-y-2">
                    <li>
                        <button hx-get="/section/setup" 
                                hx-target="#main-content" 
                                hx-swap="innerHTML"
                                class="nav-button w-full text-left px-4 py-3 rounded-xl hover:scale-105 transition-all duration-300">
                            <i class="fas fa-cogs mr-3"></i> Setup
                        </button>
                    </li>
                    <li>
                        <button hx-get="/section/rclone-transfer" 
                                hx-target="#main-content" 
                                hx-swap="innerHTML"
                                class="nav-button w-full text-left px-4 py-3 rounded-xl hover:scale-105 transition-all duration-300 active">
                            <i class="fas fa-exchange-alt mr-3"></i> Rclone Transfer
                        </button>
                    </li>
                    <li>
                        <button hx-get="/section/web-terminal" 
                                hx-target="#main-content" 
                                hx-swap="innerHTML"
                                class="nav-button w-full text-left px-4 py-3 rounded-xl hover:scale-105 transition-all duration-300">
                            <i class="fas fa-terminal mr-3"></i> Web Terminal
                        </button>
                    </li>
                    <li>
                        <button hx-get="/section/recent-commands" 
                                hx-target="#main-content" 
                                hx-swap="innerHTML"
                                class="nav-button w-full text-left px-4 py-3 rounded-xl hover:scale-105 transition-all duration-300">
                            <i class="fas fa-history mr-3"></i> Recent Commands
                        </button>
                    </li>
                    <li>
                        <button hx-get="/section/notepad" 
                                hx-target="#main-content" 
                                hx-swap="innerHTML"
                                class="nav-button w-full text-left px-4 py-3 rounded-xl hover:scale-105 transition-all duration-300">
                            <i class="fas fa-clipboard mr-3"></i> Notepad
                        </button>
                    </li>
                </ul>
            </nav>
        </aside>

        <!-- Right: Dynamic Content -->
        <section id="main-content" class="flex-1">
            <!-- Content loaded here via HTMX -->
            {% include 'sections/rclone-transfer.html' %}
        </section>
    </main>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container fixed bottom-4 right-4 z-50"></div>

    <!-- SSE Status -->
    <div id="sse-status" class="sse-status sse-status-disconnected hidden fixed bottom-4 left-4 z-50"></div>

    <!-- JavaScript -->
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
